<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assessor Financeiro Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-chart-line logo-icon"></i>
                <h1>Assessor Financeiro Pro</h1>
                <p>Sistema de Gestão Financeira</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" onclick="forgotPassword()">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                
                <div id="errorMessage" class="error-message"></div>
            </form>
            
            <div class="login-footer">
                <p><strong>Usuário padrão:</strong> admin</p>
                <p><strong>Senha:</strong> admin123</p>
            </div>
        </div>
    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
